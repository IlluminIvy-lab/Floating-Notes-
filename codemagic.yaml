workflows:
  android-build:
    name: FloatNotes Android Build
    max_build_duration: 60

    environment:
      node: 22
      java: 17

    scripts:
      - name: Verify Java version
        script: java -version

      - name: Install dependencies
        script: npm install

      - name: Install Capacitor Android
        script: npm install @capacitor/android

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
