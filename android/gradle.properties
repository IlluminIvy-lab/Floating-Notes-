plugins {
    id 'com.android.application'
}

android {
    namespace "com.ivy.floatnotes"
    compileSdk 34

    defaultConfig {
        applicationId "com.ivy.floatnotes"
        minSdk 22
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    // ✅ FORCE JAVA 17 COMPATIBILITY (fixes your error)
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}
